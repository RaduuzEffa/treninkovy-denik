<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Tréninkový deník — Evidence plateb, plánování tréninků a správa hráčů." />
  <meta name="theme-color" content="#2563EB" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Tréninkový deník" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Tréninkový deník</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- jsPDF -->

</head>
<body>

<div id="app">

  <!-- ====== SIDEBAR ====== -->

        <div>
          <h1>Tréninkový deník</h1>
          <p>Evidence &amp; plánování</p>
        </div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Hlavní</div>

        <div class="nav-item" data-route="#/projects" onclick="App.navigate('#/projects')">

      <div>
        <div class="user-name" id="sidebar-username">Trenér</div>
        <div class="user-role">Správce</div>
      </div>
    </div>
  </aside>

  <!-- ====== MOBILE HEADER ====== -->
  <header class="mobile-header" id="mobile-header">
    <div class="mobile-header-logo">
      <img src="logo-new.png" alt="Logotyp" class="sidebar-logo-img" style="width:30px;height:30px" />
      <div class="mobile-header-title">Tréninkový deník</div>
    </div>
    <button class="hamburger" id="hamburger-btn" onclick="App.toggleSidebar()" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </header>

  <!-- Sidebar drawer overlay (mobile) -->
  <div class="sidebar-drawer-overlay" id="sidebar-overlay" onclick="App.closeSidebar()"></div>

  <!-- ====== MAIN CONTENT ====== -->
  <main class="main-content" id="main-content">
    <div class="flex-center" style="height:60vh">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- ====== BOTTOM NAV (Mobile) ====== -->
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-inner">
      <div class="bottom-nav-item" data-route="#/" onclick="App.navigate('#/')">
        <span class="bnav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg></span>

        <span class="bnav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span>

<!-- ====== MODAL ====== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Dialog</div>
      <button class="modal-close" onclick="App.closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ====== TOAST ====== -->
<div id="toast-container"></div>

<!-- ====== SCRIPTS ====== -->
<script src="modules/storage.js"></script>
<script src="modules/projects.js"></script>
<script src="modules/players.js"></script>
<script src="modules/sessions.js"></script>
<script src="modules/exercises.js"></script>
<script src="modules/payments.js"></script>
<script src="modules/pdf.js"></script>
<script src="modules/settings.js"></script>
<script src="app.js"></script>
<script>
  // Register PWA Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }
</script>

</html>
